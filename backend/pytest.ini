[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --cov=app
    --cov=core
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=70

filterwarnings =
    ignore::pydantic.warnings.PydanticDeprecatedSince20

markers =
    unit: Tests that run in isolation with all dependencies mocked (fast)
    integration: Tests that exercise multiple layers together (slower)
