name: Frontend CI

on:
  push:
    branches: ["main", "master"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint + type-check (fast; runs in parallel with test)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Job 2: Tests with coverage
  # ---------------------------------------------------------------------------
  test:
    name: Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    env:
      # Provide dummy values so Next.js doesn't fail on missing env vars.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        # --passWithNoTests: allows CI to pass even if no test files are matched
        # (important in early stages of the project).
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 3: Production build check
  # ---------------------------------------------------------------------------
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
