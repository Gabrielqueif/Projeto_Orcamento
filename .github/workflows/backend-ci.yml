name: Backend CI

on:
  push:
    branches: ["main", "master"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Varredura de Secrets/Credenciais
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # Fast Static Analysis + Security SAST
  lint:
    name: Lint & SAST
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Linting & SAST Tools
        run: pip install ruff bandit pip-audit

      - name: Run ruff (lint + import sort check)
        run: |
          ruff check app core schemas --output-format=github
          ruff format --check app core schemas

      - name: Run Bandit (SAST)
        run: bandit -r app core schemas -ll

      - name: Run pip-audit (Dependency Scan)
        run: pip-audit -r requirements.txt

  # Tests with coverage report
  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov httpx

      - name: Run tests with coverage
        run: python -m pytest tests -v
        # pytest.ini configures --cov, --cov-report=xml, --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage.xml
          retention-days: 14

  # Validate Docker build (catches Dockerfile or dependency issues)
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build ./backend \
            --tag projeto-orcamento-backend:ci \
            --label "git-sha=${{ github.sha }}"
